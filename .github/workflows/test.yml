name: tests

on:
  push:
    paths:
      - '**/*.sh'
      - 'tests/**'
  pull_request:
    paths:
      - '**/*.sh'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run lint and functional tests
        run: |
          make lint
          make test
